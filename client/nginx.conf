server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers — the server sets its own for /api responses.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Reverse-proxy API calls to the backend service on the internal network.
    # The upstream hostname is "server" (the Compose service name) by default;
    # override with API_UPSTREAM at container start if needed.
    location /api/ {
        proxy_pass         http://server:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Long-lived cache for hashed static assets (Vite emits content-hashed files).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — unknown routes resolve to index.html for the React router.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache index.html so a new deploy propagates immediately.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
    }

    # Minimal, safe gzip.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
