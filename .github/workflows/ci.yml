name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: server · typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  client:
    name: client · typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  audit:
    name: dependency audit (high+ only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Audit server production deps
        working-directory: server
        # Fail the build only on HIGH and CRITICAL findings in production
        # dependencies — dev-deps are intentionally tolerated because some
        # build tooling trails published advisories.
        run: npm audit --omit=dev --audit-level=high
      - name: Audit client production deps
        working-directory: client
        run: npm audit --omit=dev --audit-level=high

  docker:
    name: docker · build images
    runs-on: ubuntu-latest
    needs: [server, client]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: false
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max
      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: false
          cache-from: type=gha,scope=client
          cache-to: type=gha,scope=client,mode=max
